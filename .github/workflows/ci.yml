name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup (Bun + caches + install)
        uses: howard86/actions/setup@a99a85ee8cbe78d34e8f5e79bfd24db64fc9b112 # v1.0.0

      - name: Lint (ultracite)
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Quality (typos, gitleaks, actionlint)
        uses: howard86/actions/quality@a99a85ee8cbe78d34e8f5e79bfd24db64fc9b112 # v1.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
